[mcp_servers.minionsos]
command = "uv"
args = ["run", "--project", ".", "python", "-m", "minions.tools.mcp_server"]
enabled = true

[mcp_servers.minionsos.tools.list_roles]
approval_mode = "approve"

# The EACN3 plugin is mounted directly: MinionsOS exposes the full eacn3_*
# surface to the role and lets the plugin handle the traffic. Filtering /
# draining / ACKing used to live in a MinionsOS proxy; that encapsulation
# has been removed. The only MinionsOS wrapper over EACN3 is the Python-side
# long-poll scheduler that delivers events to roles in their init prompt.
[mcp_servers.eacn3]
command = "node"
args = ["mcp-servers/eacn3/plugin/dist/server.js"]
enabled = true

[mcp_servers.codex-subagent]
command = "node"
args = ["mcp-servers/codex-subagent/dist/server.js"]
enabled = true

[mcp_servers.keepalive]
command = "uv"
args = ["run", "--quiet", "--no-project", "--with", "mcp[cli]", "python", "mcp-servers/keepalive/server.py"]
enabled = true

[mcp_servers.graphify]
command = "bash"
args = ["mcp-servers/graphify/launcher.sh"]
enabled = true
