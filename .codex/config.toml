[mcp_servers.minionsos]
command = "uv"
args = ["run", "--project", ".", "python", "-m", "minions.tools.mcp_server"]
enabled = true
env = { MINIONS_MCP_PROFILE = "codex" }

[mcp_servers.minionsos.tools.list_roles]
approval_mode = "approve"

[mcp_servers.eacn3]
command = "uv"
args = ["run", "--project", ".", "python", "-m", "minions.tools.eacn3_mcp_proxy", "--", "node", "EACN3/plugin/dist/server.js"]
enabled = true
# minions-role: the proxy reads MINIONS_ROLE_NAME / MINIONS_AGENT_TYPE (set by
# role.py on every wake) and advertises only the eacn3_* tools the active
# role's whitelist allows. Outside a role wake (a dev running `codex` by
# hand here), those env vars are absent and the proxy falls back to the full
# EACN3 surface. The legacy `codex-core` profile is kept in the proxy for
# backward compatibility but should not be used for new role launches.
env = { EACN3_MCP_PROFILE = "minions-role" }
