# scientific-paper.yaml
# Default Mission Profile for MinionsOS — packages autonomous scientific
# discovery with the current Gru + Ethics + Expert team contract.
#
# This profile is loaded when no --profile is specified. Gru coordinates the
# project, Ethics curates/audits memory, and Expert performs science,
# experiments, writing, and figure work.

name: scientific-paper
lightweight: false

# Roles spawned at project_create time. Ethics (memory curator + auditor) is
# pre-spawned via register_role; one generalist Expert (the
# project's general worker — code, experiments, writing, figures) is
# pre-spawned via register_expert. Gru spawns additional specialist Experts
# as the science demands.
roles_active:
  - gru
  - ethics
  - expert

# No role prompt overlays for the default scientific-paper profile.
# The standard SYSTEM.md files under minions/roles/<role>/ already encode
# the scientific discovery context.
role_prompt_overlay: {}

deliverable_schema:
  # Paths under branches/shared/ where the final deliverable artefacts live.
  # Required artefacts that mos_evaluate will verify exist before scoring.
  required:
    - branches/shared/exp/    # Expert experiment bundles
  # Optional artefacts that are part of a complete deliverable but not required.
  optional:
    - branches/shared/ethics/
    - branches/shared/reviews/
  # Per-role publish whitelist. Lists the subdirs under branches/shared/
  # each role may publish into via mos_publish_to_shared.
  # "*" means any subdir (Gru only).
  publish_whitelist:
    gru:
      - "*"
    ethics:
      - ethics
      - notes
      - draft
      - handoffs
      - governance
      - book
    expert:
      - exp
      - handoffs
      - governance

evaluation:
  # Strategy for evaluating the deliverable. The scientific-paper strategy
  # delegates to mos_review_run for full peer-review with reviewer-instance
  # multi-pass simulation.
  strategy: scientific_peer_review
  # Number of review rounds to run (mos_review_run round_number).
  default_rounds: 1

# Phase schema: scientific projects progress exploration → experiment →
# writing → review. Lives in minions/lifecycle/_project_phase.py.
phase_schema: scientific_three_stage

# Default behavior on deliverable submission: leave the project active so
# Gru can iterate (revisions, follow-up rounds). Operators close manually.
on_done: none
