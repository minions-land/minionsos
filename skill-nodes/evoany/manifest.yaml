name: evoany
description: "EvoAny — git-based evolutionary algorithm engine for automated code optimization via LLM-driven mutation, crossover, and selection"
version: "0.1.0"

# EvoAny is a repo-level workflow: it ships its own MCP server, agents,
# and skills. We mount its MCP server so the Expert can drive evolution
# loops, and inject its domain pack for context.

mcp_server:
  command: "node"
  args: ["skill-nodes/evoany/repo/dist/plugin/server.js"]
  env: {}
  tools:
    - evo_init
    - evo_step
    - evo_register_targets
    - evo_report_seed
    - evo_check_cache
    - evo_get_status
    - evo_get_lineage
    - evo_freeze_target
    - evo_boost_target
    - evo_record_synergy

domain_pack: "domain.md"

eacn_domains:
  - "evolutionary-optimization"
  - "code-evolution"
  - "automated-research"
